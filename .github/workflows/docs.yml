name: Deploy docs

on:
  push:
    branches:
      - master
    paths:
      - "docs/**"
      - "src/**"
      - "linked-libs/**"
      - "manifest.json"
      - "project.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Download latest C3 nightly
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/c3"

          tag="$(
            gh api repos/c3lang/c3c/releases \
              --jq '[.[] | select(.prerelease == true and .draft == false)][0].tag_name'
          )"

          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "No C3 prerelease/nightly release found." >&2
            exit 1
          fi

          echo "Using C3 nightly/prerelease: $tag"

          gh release download "$tag" \
            --repo c3lang/c3c \
            --pattern 'c3-linux-static.tar.gz' \
            --dir "$RUNNER_TEMP/c3"

          tar -xzf "$RUNNER_TEMP/c3/c3-linux-static.tar.gz" -C "$RUNNER_TEMP/c3"

          c3c_path="$(find "$RUNNER_TEMP/c3" -type f -name c3c | head -n 1)"

          if [ -z "$c3c_path" ]; then
            echo "Could not find c3c in downloaded archive." >&2
            find "$RUNNER_TEMP/c3" -maxdepth 4 -type f
            exit 1
          fi

          chmod +x "$c3c_path"

          c3c_dir="$(dirname "$c3c_path")"
          echo "$c3c_dir" >> "$GITHUB_PATH"

      - name: Generate C3 API docs
        run: |
          set -euo pipefail
          rm -f docs.html
          mkdir -p docs/public
          c3c docgen
          mv docs.html docs/public/docs.html

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4