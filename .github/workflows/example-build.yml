name: Build C3 examples

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-c3-examples:
    name: Build ${{ matrix.example }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        example:
          - examples/blink
          - examples/button
          - examples/fade
          - examples/hello-uart
          - examples/i2c-scanner
          - examples/interrupt-button
          - examples/lcd1602-i2c
          - examples/pot-fade
          - examples/servo
          - examples/ssd1306-i2c

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download latest C3 nightly
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mkdir -p "$RUNNER_TEMP/c3"

          tag="$(
            gh api repos/c3lang/c3c/releases \
              --jq '[.[] | select(.prerelease == true and .draft == false)][0].tag_name'
          )"

          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "No C3 prerelease/nightly release found." >&2
            exit 1
          fi

          echo "Using C3 nightly/prerelease: $tag"

          gh release download "$tag" \
            --repo c3lang/c3c \
            --pattern 'c3-linux-static.tar.gz' \
            --dir "$RUNNER_TEMP/c3"

          tar -xzf "$RUNNER_TEMP/c3/c3-linux-static.tar.gz" -C "$RUNNER_TEMP/c3"

          c3c_path="$(find "$RUNNER_TEMP/c3" -type f -name c3c | head -n 1)"

          if [ -z "$c3c_path" ]; then
            echo "Could not find c3c in downloaded archive." >&2
            find "$RUNNER_TEMP/c3" -maxdepth 4 -type f
            exit 1
          fi

          chmod +x "$c3c_path"

          c3c_dir="$(dirname "$c3c_path")"
          echo "$c3c_dir" >> "$GITHUB_PATH"

      - name: Show C3 compiler version
        run: c3c --version

      - name: Build example
        working-directory: ${{ matrix.example }}
        run: c3c build