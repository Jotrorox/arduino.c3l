name: Build C3 examples

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

jobs:
  build-c3-examples:
    name: Build ${{ matrix.example }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        example:
          - examples/blink
          - examples/button
          - examples/fade
          - examples/hello-uart
          - examples/i2c-scanner
          - examples/interrupt-button
          - examples/lcd1602-i2c
          - examples/pot-fade
          - examples/servo
          - examples/ssd1306-i2c

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup C3
        uses: jotrorox/setup-c3@v1

      - name: Build example
        working-directory: ${{ matrix.example }}
        run: c3c build